name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core-build-and-smoke-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        run: swift build

      - name: Run smoke tests
        run: swift run munirename-smoketests

      - name: Validate CLI help
        run: swift run munirename-cli --help

  xcode-app-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build macOS app target
        run: ./scripts/xcode_build.sh
